spring:
  application:
    name: core-learning
  datasource:
    url: jdbc:mysql://localhost:3306/gin?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:

server:
  servlet:
    context-path: /api
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.corelearning.mapper: debug

jwt:
  secret-key: this-is-a-very-long-secret-key-for-jwt-signing-1234567890abcdef
  expire-time: 7200000